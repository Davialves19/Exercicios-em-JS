<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        var valor = prompt("Digite um numero: ")

        var valor_convert = Number(valor)

        anterior = valor_convert-1
        posterior = valor_convert+1

        alert("O numero anterior a " +valor_convert+ " é " +anterior+ ".")
        alert("O numero posterior a " +valor_convert+ " é " +posterior+ ".")



    </script>
</body>
</html>
